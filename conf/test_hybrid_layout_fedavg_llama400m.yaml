# ================================================================================
# Hybrid Slurm preset — Llama **~400 M** (**disk**) + C4 (**load_from_disk**) + FedAvgLLM.
#
# Same lattice / Slurm semantics as ``test_hybrid_layout_fedavg_llama150m``.
#
# Prerequisites (reuse 150 M data prep — **same C4 + tokenizer**, different weights dir):
#   - ``OMNIFED_C4_DISK``, ``OMNIFED_TOKENIZER_DIR`` — unchanged from Llama‑150 M LM runs.
#   - ``OMNIFED_LLAMA400_WEIGHTS`` — local ``LlamaForCausalLM`` tree (offline hub snapshot).
#
# ``global_rounds`` / ``engine.hybrid.server_*`` — same rationale as Llama‑150 M LM preset;
# 400 M trains slower ⇒ prefer fewer ``global_rounds`` within your ``slurm.time`` cap.
#
# Example:
#   OMNIFED_C4_DISK=... OMNIFED_TOKENIZER_DIR=... OMNIFED_LLAMA400_WEIGHTS=... \\
#     ./main.sh --config-name test_hybrid_layout_fedavg_llama400m \\
#       overwrite=true engine.mode=slurm global_rounds=2 \\
#       slurm.time=01:35:00 ... slurm.nodes=7 ...
# ================================================================================

defaults:
  - test_fedavg_llm_centralized_torchdist_llama400m
  - _self_

engine:
  mode: slurm
  communication_mode: hybrid
  hybrid:
    topology_config: null
    layout:
      num_facilities: 2
      mpi_ranks_per_facility: 3
      dedicated_rpc_server: true
      rpc_addr: "127.0.0.1"
      rpc_port: 50051
      facility_mpi_addr: "127.0.0.1"
      facility_mpi_base_port: 28250
      facility_mpi_port_stride: 40
      facility_name_prefix: "fac"
      communicators:
        intra_facility: torch_mpi
        global_aggregation: grpc
    training:
      dataset_total_clients: 6
    server_run_extra_sec: 600
    server_sec_per_round: 5000

topology:
  num_clients: 6

global_rounds: 2
